<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<header>
    <h1>Task Tracker</h1>
    <div id="currentDate" class="date-box"></div>
</header>

<section class="tasks-section">
    <h2>Today's Tasks</h2>
    
    <div id="tasksList" class="tasks-list"></div>

    <div class="add-task">
        <input type="text" id="newTaskInput" placeholder="Add task...">
        <button id="addTaskBtn">+</button>
    </div>
</section>

<section class="progress-section">
    <h2>Progress</h2>

    <div class="stats-cards">
        <div class="stat-card">
            <span class="stat-label">Today</span>
            <div class="progress-bar-container">
                <div id="todayBar" class="progress-bar"></div>
            </div>
            <span id="todayPercent" class="stat-percent">0%</span>
        </div>
    </div>
</section>

<div class="footer-actions">
    <button id="resetDataBtn" class="danger-btn">Reset</button>
    <button id="exportDataBtn" class="secondary-btn">Export</button>
    <button id="importDataBtn" class="secondary-btn">Import</button>
    <input type="file" id="importFile" hidden>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
